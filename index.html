    <script>
      /* Boot: reset stanu, scroll, failsafe gdy JS/cache nie załadują modułu */
      (function () {
        var BOOT_RELEASE_MS = 8000;
        var BOOT_HELP_MS = 12000;

        if ("scrollRestoration" in history) history.scrollRestoration = "manual";
        window.scrollTo(0, 0);

        if (location.hash) {
          var h = location.hash.slice(1);
          /* Zachowaj kotwice sekcji homepage (#discover, #events…); czyść tylko stare hash-e labiryntu */
          if (/^(salon|client)(\/|$)/.test(h)) {
            history.replaceState(null, "", location.pathname + location.search);
          }
        }

        try {
          var s = JSON.parse(localStorage.getItem("hairqoo_labyrinth") || "{}");
          delete s.portal;
          s.lastChamber = 0;
          localStorage.setItem("hairqoo_labyrinth", JSON.stringify(s));
        } catch (e) {
          try {
            localStorage.removeItem("hairqoo_labyrinth");
          } catch (e2) {}
        }

        window.__hairqooAppReady = false;
        window.__hairqooBootComplete = false;
        window.__hairqooMarkBootComplete = function () {
          window.__hairqooBootComplete = true;
        };
        window.__hairqooShowBootHelp = function () {
          var banner = document.getElementById("boot-fallback");
          if (banner) banner.hidden = false;
        };
        window.__hairqooReleaseGate = function () {
          if (window.__hairqooBootComplete) return;
          window.__hairqooMarkBootComplete();
          document.body.classList.remove("is-preloading");
          var gate = document.getElementById("gate");
          if (gate) gate.classList.add("is-poster-ready");
          var preloader = document.getElementById("preloader");
          if (preloader && !preloader.classList.contains("is-done")) {
            preloader.classList.add("is-done");
            setTimeout(function () {
              preloader.remove();
            }, 950);
          }
        };

        setTimeout(function () {
          if (!window.__hairqooAppReady) window.__hairqooReleaseGate();
        }, BOOT_RELEASE_MS);

        setTimeout(function () {
          if (!window.__hairqooAppReady) window.__hairqooShowBootHelp();
        }, BOOT_HELP_MS);

        window.addEventListener("pageshow", function (e) {
          window.scrollTo(0, 0);
          if (e.persisted && !window.__hairqooAppReady) {
            window.__hairqooReleaseGate();
          }
        });
      })();
    </script>
